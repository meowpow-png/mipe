name: Release Runtime

on:
  push:
    tags:
      - runtime/v*
  workflow_dispatch:
    inputs:
      tag:
        description: Existing runtime release tag to validate and publish
        required: true
        type: string

permissions:
  actions: read
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Validate release tag and source
        id: validate
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: bash .github/scripts/validate-release-source.sh

      - name: Resolve development image digests
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          CI_RUN_ID: ${{ steps.validate.outputs.ci_run_id }}
          SOURCE_SHA: ${{ steps.validate.outputs.source_sha }}
        run: bash .github/scripts/resolve-release-source.sh

      - name: Promote release images
        id: promote
        if: ${{ false }}
        run: |
          # Retag each resolved digest in GHCR without rebuilding any layers.
          # Publish the full vX.Y.Z tag and any supported moving tags, such as
          # vX.Y, vX, and latest, according to the runtime tag policy.

      - name: Generate release attestations
        id: attest
        if: ${{ false }}
        run: |
          # Generate an SBOM for each promoted image digest.
          # Generate provenance that identifies this workflow, release tag, and
          # source digest, then attach the metadata to the released images.

      - name: Create release manifest
        id: manifest
        if: ${{ false }}
        run: |
          # Write a machine-readable manifest listing every user-facing runtime
          # variant, its release tags, its immutable digest, and agent version.
          # Preserve the manifest as a workflow artifact and release asset.

      - name: Publish GitHub release
        id: publish
        if: ${{ false }}
        run: |
          # Create the GitHub Release for the runtime/vX.Y.Z tag.
          # Use the matching changelog section as the release notes and attach
          # the release manifest and any SBOM or provenance artifacts.

      - name: Verify published release
        id: verify
        if: ${{ false }}
        run: |
          # Resolve every published release tag and confirm it matches the
          # originally selected digest for that runtime variant.
          # Confirm that the expected SBOM and provenance metadata is available.

      - name: Generate release summary
        if: ${{ always() && steps.validate.outcome == 'success' && steps.resolve.outcome == 'success' }}
        env:
          RELEASE_TAG: ${{ steps.validate.outputs.release_tag }}
          RELEASE_VERSION: ${{ steps.validate.outputs.release_version }}
          SOURCE_SHA: ${{ steps.validate.outputs.source_sha }}
          SOURCE_CI_RUN_ID: ${{ steps.validate.outputs.ci_run_id }}
          REPOSITORY: ${{ github.repository }}

          VALIDATE_STATUS: ${{ steps.validate.outcome }}
          RESOLVE_STATUS: ${{ steps.resolve.outcome }}
          PROMOTE_STATUS: ${{ steps.promote.outcome }}
          ATTEST_STATUS: ${{ steps.attest.outcome }}
          MANIFEST_STATUS: ${{ steps.manifest.outcome }}
          PUBLISH_STATUS: ${{ steps.publish.outcome }}
          VERIFY_STATUS: ${{ steps.verify.outcome }}
        run: .github/scripts/render-release-summary.sh > "$GITHUB_STEP_SUMMARY"
