name: Runtime Build

on:
  workflow_call:
    inputs:
      publish:
        description: Push runtime images and record their immutable digests
        required: true
        type: boolean
      provenance:
        description: Generate BuildKit provenance for published runtime images
        required: false
        type: boolean
        default: false
      sbom:
        description: Generate BuildKit SBOMs for published runtime images
        required: false
        type: boolean
        default: false
      image_tags:
        description: Comma-separated tags to publish for every runtime image
        required: false
        type: string
        default: ""
      build_version:
        description: Version embedded in runtime images; defaults to a content-derived development version
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILDKIT_PROGRESS: plain

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          cache: true
          go-version-file: runtime/go.mod
          cache-dependency-path: runtime/go.sum

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-flags: --debug

      - name: Set build version
        id: version
        env:
          BUILD_VERSION: ${{ inputs.build_version }}
        run: |
          if [[ -n "$BUILD_VERSION" ]]; then
            version="$BUILD_VERSION"
          else
            version="$(bash runtime/scripts/get-go-build-version.sh)"
          fi
          echo "version=$version" >> "${GITHUB_OUTPUT}"

      - name: Run tests with coverage
        id: coverage
        working-directory: runtime
        run: |
          mkdir -p build/reports

          go test -coverprofile=build/reports/coverage.out -v ./...

          go tool cover -func=build/reports/coverage.out \
            | tee build/reports/coverage.txt

          coverage="$(
            awk '/^total:/ { print $3 }' build/reports/coverage.txt
          )"
          echo "coverage=$coverage" >> "${GITHUB_OUTPUT}"

      - name: Build test image
        uses: docker/bake-action@v7
        env:
          VERSION: ${{ steps.version.outputs.version }}
        with:
          source: ./runtime
          targets: |
            runtime
            test
          provenance: false
          sbom: false
          load: true
          set: |
            runtime.output=type=cacheonly
            runtime.cache-from=type=gha,scope=runtime
            runtime.cache-to=type=gha,scope=runtime,mode=max

            test.output=type=docker
            test.cache-from=type=gha,scope=runtime

      - name: Run integration tests
        working-directory: runtime
        run: MIPE_INTEGRATION=1 go test -v ./integration/...

      - name: Log in to GitHub Container Registry
        if: inputs.publish
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base image caches
        uses: docker/bake-action@v7
        env:
          VERSION: ${{ steps.version.outputs.version }}
        with:
          source: ./runtime
          files: |
            docker-bake.hcl
            docker-bake-ci.hcl
          targets: |
            node-base
            java-base
            web-base
          provenance: false
          sbom: false
          set: |
            node-base.output=type=cacheonly
            node-base.cache-from=type=gha,scope=node-base
            node-base.cache-from=type=gha,scope=runtime
            node-base.cache-to=type=gha,scope=node-base,mode=max

            java-base.output=type=cacheonly
            java-base.cache-from=type=gha,scope=java-base
            java-base.cache-from=type=gha,scope=node-base
            java-base.cache-from=type=gha,scope=runtime
            java-base.cache-to=type=gha,scope=java-base,mode=max

            web-base.output=type=cacheonly
            web-base.cache-from=type=gha,scope=web-base
            web-base.cache-from=type=gha,scope=node-base
            web-base.cache-from=type=gha,scope=runtime
            web-base.cache-to=type=gha,scope=web-base,mode=max

      - name: Build and publish runtime images
        id: publish
        uses: docker/bake-action@v7
        env:
          VERSION: ${{ steps.version.outputs.version }}
          IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/mipe-runtime
          IMAGE_TAGS: ${{ inputs.image_tags }}
        with:
          source: ./runtime
          files: |
            docker-bake.hcl
            docker-bake-ci.hcl
          targets: |
            runtime
            codex
            codex-java
            codex-web
            claude
            claude-java
            claude-web
          provenance: ${{ inputs.provenance }}
          sbom: ${{ inputs.sbom }}
          push: ${{ inputs.publish }}
          set: |
            runtime.output=type=image,rewrite-timestamp=true
            runtime.cache-from=type=gha,scope=runtime
            runtime.cache-to=type=gha,scope=runtime,mode=max

            codex.output=type=image,rewrite-timestamp=true
            codex-java.output=type=image,rewrite-timestamp=true
            codex-web.output=type=image,rewrite-timestamp=true

            claude.output=type=image,rewrite-timestamp=true
            claude-java.output=type=image,rewrite-timestamp=true
            claude-web.output=type=image,rewrite-timestamp=true

            codex.cache-from=type=gha,scope=node-base
            codex.cache-from=type=gha,scope=runtime

            claude.cache-from=type=gha,scope=node-base
            claude.cache-from=type=gha,scope=runtime

            codex-java.cache-from=type=gha,scope=java-base
            codex-java.cache-from=type=gha,scope=node-base
            codex-java.cache-from=type=gha,scope=runtime

            claude-java.cache-from=type=gha,scope=java-base
            claude-java.cache-from=type=gha,scope=node-base
            claude-java.cache-from=type=gha,scope=runtime

            codex-web.cache-from=type=gha,scope=web-base
            codex-web.cache-from=type=gha,scope=node-base
            codex-web.cache-from=type=gha,scope=runtime

            claude-web.cache-from=type=gha,scope=web-base
            claude-web.cache-from=type=gha,scope=node-base
            claude-web.cache-from=type=gha,scope=runtime

      - name: Write release source manifest
        if: inputs.publish
        env:
          SOURCE_SHA: ${{ github.sha }}
          CI_RUN_ID: ${{ github.run_id }}
          BUILD_VERSION: ${{ steps.version.outputs.version }}
          IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/mipe-runtime
          IMAGE_TAGS: ${{ inputs.image_tags }}
          BUILD_METADATA: ${{ steps.publish.outputs.metadata }}
        run: >
          .github/scripts/write-release-source-manifest.sh
          > runtime/build/reports/release-source.json

      - name: Upload release source manifest
        if: inputs.publish
        uses: actions/upload-artifact@v7
        with:
          name: runtime-release-source
          path: runtime/build/reports/release-source.json
          if-no-files-found: error
          retention-days: 90

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: runtime/build/reports/coverage.out
          disable_search: true
          fail_ci_if_error: true

      - name: Generate CI summary
        env:
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          VERSION: ${{ steps.version.outputs.version }}

          UNIT_TESTS: PASS
          INTEGRATION_TESTS: PASS
          COVERAGE: ${{ steps.coverage.outputs.coverage }}

          OWNER: ${{ github.repository_owner }}
          IMAGE_TAGS: ${{ inputs.image_tags }}
          BUILD_METADATA: ${{ steps.publish.outputs.metadata }}

        run: .github/scripts/render-ci-summary.sh > "$GITHUB_STEP_SUMMARY"
