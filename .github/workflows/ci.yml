name: CI

on:
  workflow_dispatch:
  push:
    branches: [ master, dev ]
    paths:
      - .github/workflows/ci.yml
      - runtime/cmd/**
      - runtime/internal/**
      - runtime/integration/**
      - runtime/go.mod
      - runtime/go.sum
      - runtime/docker/**
      - runtime/hooks/**
      - runtime/docker-bake.hcl
      - runtime/compose.yml

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          cache: true
          go-version-file: runtime/go.mod
          cache-dependency-path: runtime/go.sum

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set build version
        id: version
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          echo "version=dev-${GITHUB_SHA:0:7}" >> "${GITHUB_OUTPUT}"

      - name: Run tests
        working-directory: runtime
        run: go test -v ./...

      - name: Build Docker images
        uses: docker/bake-action@v7
        env:
          VERSION: ${{ steps.version.outputs.version }}
        with:
          source: ./runtime
          targets: |
            runtime
            test
            node-base
            codex
            codex-java
            codex-web
            claude
            claude-java
            claude-web
          provenance: false
          sbom: false
          set: |
            runtime.cache-from=type=gha,scope=runtime
            runtime.cache-to=type=gha,scope=runtime,mode=max
            runtime.output=type=docker

            test.cache-from=type=gha,scope=runtime
            test.output=type=docker

            codex.output=type=docker
            codex-java.output=type=docker
            codex-web.output=type=docker
            claude.output=type=docker
            claude-java.output=type=docker
            claude-web.output=type=docker

            node-base.cache-from=type=gha,scope=node-base
            node-base.cache-from=type=gha,scope=runtime
            node-base.cache-to=type=gha,scope=node-base,mode=max

            codex.cache-from=type=gha,scope=node-base
            codex.cache-from=type=gha,scope=runtime

            claude.cache-from=type=gha,scope=node-base
            claude.cache-from=type=gha,scope=runtime

      - name: Run integration tests
        working-directory: runtime
        run: MIPE_INTEGRATION=1 go test -v ./integration/...

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/dev'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish development images
        if: github.ref == 'refs/heads/dev'
        env:
          GHCR_OWNER: ${{ github.repository_owner }}
          VERSION: ${{ steps.version.outputs.version }}
        run: .github/scripts/publish.sh
