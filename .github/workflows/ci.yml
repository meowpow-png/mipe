name: CI

on:
  workflow_dispatch:
  push:
    branches: [ master, dev ]

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          cache: true
          go-version-file: runtime/go.mod
          cache-dependency-path: runtime/go.sum

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run tests
        working-directory: runtime
        run: go test -v ./...

      - name: Build Docker images
        uses: docker/bake-action@v7
        with:
          source: ./runtime
          targets: |
            runtime
            node-base
            java-base
            web-base
            codex
            claude
          provenance: false
          sbom: false
          set: |
            runtime.cache-from=type=gha,scope=runtime
            runtime.cache-to=type=gha,scope=runtime,mode=max

            node-base.cache-from=type=gha,scope=node-base
            node-base.cache-from=type=gha,scope=runtime
            node-base.cache-to=type=gha,scope=node-base,mode=max

            codex.cache-from=type=gha,scope=codex
            codex.cache-from=type=gha,scope=node-base
            codex.cache-from=type=gha,scope=runtime
            codex.cache-to=type=gha,scope=codex,mode=max

            claude.cache-from=type=gha,scope=claude
            claude.cache-from=type=gha,scope=node-base
            claude.cache-from=type=gha,scope=runtime
            claude.cache-to=type=gha,scope=claude,mode=max
