name: CI

on:
  workflow_dispatch:
  push:
    branches: [ master, dev ]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          cache: true
          go-version-file: runtime/go.mod
          cache-dependency-path: runtime/go.sum

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run tests
        working-directory: runtime
        run: go test -v ./...

      - name: Build Docker images
        uses: docker/bake-action@v7
        with:
          source: ./runtime
          targets: |
            runtime
            test
            node-base
            codex
            codex-java
            codex-web
            claude
            claude-java
            claude-web
          provenance: false
          sbom: false
          set: |
            runtime.cache-from=type=gha,scope=runtime
            runtime.cache-to=type=gha,scope=runtime,mode=max

            test.cache-from=type=gha,scope=runtime
            test.output=type=docker

            node-base.cache-from=type=gha,scope=node-base
            node-base.cache-from=type=gha,scope=runtime
            node-base.cache-to=type=gha,scope=node-base,mode=max

            codex.cache-from=type=gha,scope=node-base
            codex.cache-from=type=gha,scope=runtime

            claude.cache-from=type=gha,scope=node-base
            claude.cache-from=type=gha,scope=runtime

      - name: Run integration tests
        working-directory: runtime
        run: MIPE_INTEGRATION=1 go test -v ./integration/...
