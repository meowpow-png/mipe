name: CI

on:
  workflow_dispatch:
  push:
    branches: [ master, dev ]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          cache: true
          go-version-file: runtime/go.mod
          cache-dependency-path: runtime/go.sum

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run tests
        working-directory: runtime
        run: |
          go test -v ./...
          MIPE_INTEGRATION=1 go test -v ./integration/...

      - name: Build Docker images
        uses: docker/bake-action@v7
        with:
          source: ./runtime
          targets: default
          provenance: false
          sbom: false
          set: |
            runtime.cache-from=type=gha,scope=runtime
            runtime.cache-to=type=gha,scope=runtime,mode=max
          
            node-base.cache-from=type=gha,scope=node-base
            node-base.cache-to=type=gha,scope=node-base,mode=max
          
            java-base.cache-from=type=gha,scope=java-base
            java-base.cache-to=type=gha,scope=java-base,mode=max
          
            web-base.cache-from=type=gha,scope=web-base
            web-base.cache-to=type=gha,scope=web-base,mode=max
          
            codex*.cache-from=type=gha,scope=codex
            codex*.cache-to=type=gha,scope=codex,mode=max
          
            claude*.cache-from=type=gha,scope=claude
            claude*.cache-to=type=gha,scope=claude,mode=max
