name: CI

on:
  workflow_dispatch:
  push:
    branches: [ main, dev ]
    paths:
      - .github/workflows/ci.yml
      - .github/workflows/runtime-build.yml
      - .github/workflows/runtime-release.yml
      - .github/scripts/**
      - .github/templates/**
      - runtime/cmd/**
      - runtime/internal/**
      - runtime/integration/**
      - runtime/go.mod
      - runtime/go.sum
      - runtime/docker/**
      - runtime/hooks/**
      - runtime/docker-bake.hcl
      - runtime/docker-bake-ci.hcl
      - runtime/compose.yml

permissions:
  contents: read
  packages: write

jobs:
  runtime-build:
    uses: ./.github/workflows/runtime-build.yml
    with:
      publish: ${{ github.ref == 'refs/heads/dev' }}
      provenance: false
      sbom: false
