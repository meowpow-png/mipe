name: Runtime Code Coverage

on:
  workflow_dispatch:
  push:
    branches: [ dev, main, 'release/**' ]
    paths:
      - .github/workflows/runtime-coverage.yml
      - runtime/cmd/**
      - runtime/internal/**
      - runtime/go.mod
      - runtime/go.sum

permissions:
  contents: read

jobs:
  coverage:
    name: Report Runtime Code Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          cache: true
          go-version-file: runtime/go.mod
          cache-dependency-path: runtime/go.sum

      - name: Generate coverage report
        id: coverage
        working-directory: runtime
        run: |
          mkdir -p build/reports
          go test -coverprofile=build/reports/coverage.out -v ./...
          go tool cover -func=build/reports/coverage.out | tee build/reports/coverage.txt
          coverage="$(awk '/^total:/ { print $3 }' build/reports/coverage.txt)"
          color="$(awk -v coverage="${coverage%%%}" 'BEGIN {
            if (coverage >= 80) print "brightgreen"
            else if (coverage >= 60) print "yellow"
            else print "red"
          }')"
          echo "coverage=${coverage}" >> "${GITHUB_OUTPUT}"
          echo "color=${color}" >> "${GITHUB_OUTPUT}"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: runtime-code-coverage
          path: |
            runtime/build/reports/coverage.out
            runtime/build/reports/coverage.txt
          if-no-files-found: error
          retention-days: 90

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.9.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 9d82a498aa63b2b7b872629c4cd6759c
          filename: mipe-runtime-coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.coverage }}
          color: ${{ steps.coverage.outputs.color }}

      - name: Generate coverage summary
        if: ${{ always() }}
        env:
          MODULE: Runtime
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          COVERAGE: ${{ steps.coverage.outputs.coverage || 'unavailable' }}
        run: .github/scripts/render-coverage-summary.sh > "$GITHUB_STEP_SUMMARY"
