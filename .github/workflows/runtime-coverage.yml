name: Runtime Code Coverage

on:
  push:
    branches: [ dev, main, 'release/**' ]
    paths:
      - .github/workflows/runtime-coverage.yml
      - runtime/cmd/**
      - runtime/internal/**
      - runtime/go.mod
      - runtime/go.sum

permissions:
  contents: read

jobs:
  coverage:
    name: Report Runtime Code Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          cache: true
          go-version-file: runtime/go.mod
          cache-dependency-path: runtime/go.sum

      - name: Generate coverage report
        id: coverage
        working-directory: runtime
        run: |
          mkdir -p build/reports
          go test -coverprofile=build/reports/coverage.out -v ./...
          go tool cover -func=build/reports/coverage.out | tee build/reports/coverage.txt
          echo "coverage=$(awk '/^total:/ { print $3 }' build/reports/coverage.txt)" >> "${GITHUB_OUTPUT}"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: runtime-code-coverage
          path: |
            runtime/build/reports/coverage.out
            runtime/build/reports/coverage.txt
          if-no-files-found: error
          retention-days: 90

      - name: Upload coverage to Codecov
        id: codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: runtime/build/reports/coverage.out
          disable_search: true
          fail_ci_if_error: true

      - name: Generate coverage summary
        if: ${{ always() }}
        env:
          MODULE: Runtime
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          COVERAGE: ${{ steps.coverage.outputs.coverage || 'unavailable' }}
          CODECOV_STATUS: ${{ steps.codecov.outcome }}
        run: .github/scripts/render-coverage-summary.sh > "$GITHUB_STEP_SUMMARY"
