include:
  - compose.yml

services:
  runtime-test:
    image: mipe-runtime:test
    pull_policy: never
    build:
      context: .
      dockerfile: docker/test/Dockerfile
      args:
        LOCAL_UID: "1000"
        LOCAL_GID: "1000"
    working_dir: /workspace
    environment:
      LOCAL_UID: "1000"
      LOCAL_GID: "1000"
