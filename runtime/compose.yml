services:
  codex:
    image: mipe-runtime-codex:latest
    pull_policy: never
    working_dir: /workspace
    environment:
      LOCAL_UID: "1000"
      LOCAL_GID: "1000"
    volumes:
      - codex-home:/home/dev/.codex
      - .:/workspace:Z
    command: mipe -debug codex

  claude:
    image: mipe-runtime-claude:latest
    pull_policy: never
    working_dir: /workspace
    environment:
      LOCAL_UID: "1000"
      LOCAL_GID: "1000"
    volumes:
      - claude-home:/home/dev
      - .:/workspace:Z
    command: mipe -debug claude

volumes:
  codex-home:
  claude-home:
