name: mipe

x-runtime: &runtime
  pull_policy: never
  working_dir: /workspace
  environment:
    LOCAL_UID: "1000"
    LOCAL_GID: "1000"
    MIPE_DEBUG: true
  volumes:
    - .:/workspace:Z

x-codex: &codex
  <<: *runtime
  volumes:
    - codex-home:/home/dev/.codex
    - .:/workspace:Z

x-codex-web: &codex-web
  <<: *runtime
  volumes:
    - codex-web-home:/home/dev/web
    - .:/workspace:Z

x-claude: &claude
  <<: *runtime
  volumes:
    - claude-home:/home/dev
    - .:/workspace:Z

x-claude-web: &claude-web
  <<: *runtime
  volumes:
    - claude-web-home:/home/dev/web
    - .:/workspace:Z

services:
  mipe:
    <<: *runtime
    image: mipe-runtime:latest

  codex:
    <<: *codex
    image: mipe-runtime-codex:latest

  codex-java:
    <<: *codex
    image: mipe-runtime-codex-java:latest

  codex-web:
    <<: *codex-web
    image: mipe-runtime-codex-web:latest

  claude:
    <<: *claude
    image: mipe-runtime-claude:latest

  claude-java:
    <<: *claude
    image: mipe-runtime-claude-java:latest

  claude-web:
    <<: *claude-web
    image: mipe-runtime-claude-web:latest

volumes:
  codex-home:
  codex-web-home:
  claude-home:
  claude-web-home:
