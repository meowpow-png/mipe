services:
  codex:
    image: mipe-runtime-codex:latest
    build:
      context: .
      dockerfile: docker/codex/Dockerfile
    working_dir: /workspace
    environment:
      AGENT_HOME: /home/dev/.codex
      RUNTIME_HOME: /opt/mipe
      WORKSPACE: /workspace
      LOCAL_UID: "1000"
      LOCAL_GID: "1000"
    volumes:
      - ~/.codex:/home/dev/.codex:Z
      - .:/workspace:Z
