services:
  codex:
    image: mipe-runtime-codex:latest
    build:
      context: .
      dockerfile: docker/codex/Dockerfile
    working_dir: /workspace
    environment:
      RUNTIME_HOME: /opt/mipe
      LOCAL_UID: "1000"
      LOCAL_GID: "1000"
    volumes:
      - codex-home:/home/dev/.codex
      - .:/workspace:Z

volumes:
  codex-home:
