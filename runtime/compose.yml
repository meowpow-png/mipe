name: mipe

x-codex: &codex
  pull_policy: never
  working_dir: /workspace
  environment:
    LOCAL_UID: "1000"
    LOCAL_GID: "1000"
  volumes:
    - codex-home:/home/dev/.codex
    - .:/workspace:Z

x-claude: &claude
  pull_policy: never
  working_dir: /workspace
  environment:
    LOCAL_UID: "1000"
    LOCAL_GID: "1000"
  volumes:
    - claude-home:/home/dev
    - .:/workspace:Z

services:
  codex:
    <<: *codex
    image: mipe-runtime-codex:latest

  codex-java:
    <<: *codex
    image: mipe-runtime-codex-java:latest

  codex-web:
    <<: *codex
    image: mipe-runtime-codex-web:latest

  claude:
    <<: *claude
    image: mipe-runtime-claude:latest

  claude-java:
    <<: *claude
    image: mipe-runtime-claude-java:latest

  claude-web:
    <<: *claude
    image: mipe-runtime-claude-web:latest

volumes:
  codex-home:
  claude-home:
