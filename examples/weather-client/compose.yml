services:
  mipe:
    image: mipe-codex:26-node
    pull_policy: never
    working_dir: /workspace
    environment:
      LOCAL_UID: ${LOCAL_UID}
      LOCAL_GID: ${LOCAL_GID}
      HOME: /home/codex
    volumes:
      - codex-home:/home/codex
      - .:/workspace:Z
    stdin_open: true
    tty: true
    init: true

volumes:
  codex-home:
